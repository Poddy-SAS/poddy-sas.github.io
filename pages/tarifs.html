<section class="page-section">
<div class="container">

<div class="row justify-content-center">
<div class="col-lg-8">

<div class="calculator-box">

<h1>Calculateur de tarifs de diagnostic immobilier</h1>

<h2>Estimation indicative</h2>

<br><br>

<label>Type de bien :</label>
<select id="propertyType" class="form-control">
<option value="0">Studio</option>
<option value="1">T1</option>
<option value="2">T2</option>
<option value="3">T3</option>
<option value="4">T4</option>
<option value="5">T5</option>
<option value="6">T6</option>
<option value="7">T7</option>
<option value="8">T8</option>
<option value="9">T9</option>
<option value="10">T10</option>
<option value="11">T11</option>
<option value="12">T12</option>
<option value="13">T13</option>
<option value="14">T14</option>
<option value="15">T15</option>
<option value="16">T16</option>
<option value="17">T17</option>
<option value="18">T18</option>
<option value="19">T19</option>
<option value="20">T20</option>
<option value="21">T21</option>
<option value="22">T22</option>
<option value="23">T23</option>
<option value="24">T24</option>
</select>

<br><br>

<label>Type de transaction</label>

<label>
<input type="radio" name="transaction" value="vente" checked>
Vente
</label>

<label>
<input type="radio" name="transaction" value="location">
Location
</label>

<br><br>

<label>Année du permis de construire :</label>
<input type="number" id="constructionYear" class="form-control" placeholder="ex: 1985">

<br><br>

<label>Installation gaz > 15 ans ?</label>
<select id="gasAge" class="form-control">
<option value="no">Non</option>
<option value="yes">Oui</option>
</select>

<br><br>

<label>Installation électrique > 15 ans ?</label>
<select id="elecAge" class="form-control">
<option value="no">Non</option>
<option value="yes">Oui</option>
</select>

<br><br>

<label>
<input type="checkbox" id="termite">
Diagnostic termite (si zone concernée)
</label>

<p>
Vérifiez votre commune ici :
<a href="https://termite.com.fr/rechercher/" target="_blank">
termite.com.fr
</a>
</p>

<hr>

<h3>Localisation du bien</h3>

<label>Code postal :</label>
<input type="text" id="postalCode" class="form-control" placeholder="ex: 87000" maxlength="5" inputmode="numeric">

<br><br>

<div id="formError" class="form-error"></div>

<div style="text-align:center;">
<button class="main-red-button" onclick="calculate()">
Calculer le tarif
</button>
</div>

<div id="result"></div>

</div>
</div>
</div>
